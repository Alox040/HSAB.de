name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Repository health check
        run: npm run check:repo

      - name: German umlaut check
        run: npm run check:umlauts

      - name: Routing validation
        run: npm run validate:routing

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Use placeholder values for build — contact form will fail at runtime without real values
          RESEND_API_KEY: build_placeholder
          CONTACT_TO_EMAIL: build@placeholder.de
          CONTACT_FROM_EMAIL: build@placeholder.de
